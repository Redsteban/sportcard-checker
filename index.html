<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Sport Card Price Checker</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;min-height:100vh;display:grid;place-items:center;padding:2rem}
.box{background:#1e293b;border-radius:1.5rem;padding:2.5rem;width:100%;max-width:32rem;box-shadow:0 25px 50px -12px #000}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#94a3b8;margin-bottom:1.5rem;font-size:.875rem}
.drop{border:2px dashed #475569;border-radius:1rem;padding:2rem;text-align:center;cursor:pointer;transition:all .2s}
.drop:hover,.drop.active{border-color:#fbbf24;background:#334155}
#prev{max-height:220px;margin:.75rem 0;border-radius:.5rem;display:none;width:100%;object-fit:contain}
button{width:100%;padding:.75rem;border:none;border-radius:.75rem;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f172a;font-weight:600;font-size:1rem;cursor:pointer;transition:opacity .2s;margin-top:1rem}
button:disabled{opacity:.4;cursor:not-allowed}
.spin{margin:1rem auto;width:2rem;height:2rem;border:3px solid #334155;border-top-color:#fbbf24;border-radius:50%;animation:s .6s linear infinite;display:none}
@keyframes s{to{transform:rotate(360deg)}}
#res{display:none;margin-top:1.5rem}
.row{background:#0f172a;border-radius:.5rem;padding:.75rem 1rem;margin-bottom:.5rem}
.lbl{color:#94a3b8;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em}
.val{color:#e2e8f0;font-size:1rem;margin-top:.2rem}
.pr{font-size:1.5rem;font-weight:700;color:#22c55e}
.er{color:#ef4444;font-size:.875rem;margin-top:.5rem;display:none}
</style></head>
<body>
<div class="box">
<h1>Sport Card Price Checker</h1>
<p>Upload a photo of a collectible sport card</p>
<div class="drop" id="dz"><p>Drop photo here, or click to select</p><input type="file" id="fi" accept="image/*" hidden></div>
<img id="prev">
<div class="spin" id="sp"></div>
<button id="go" disabled>Analyze Card</button>
<div class="er" id="er"></div>
<div id="res"><h2 style="font-size:1rem;color:#fbbf24;margin-bottom:.5rem">Result</h2>
<div class="row"><div class="lbl">Card</div><div class="val" id="c1"></div></div>
<div class="row"><div class="lbl">Player</div><div class="val" id="c2"></div></div>
<div class="row"><div class="lbl">Year / Set</div><div class="val" id="c3"></div></div>
<div class="row"><div class="lbl">Condition</div><div class="val" id="c4"></div></div>
<div class="row"><div class="lbl">Est. Value</div><div class="val pr" id="c5"></div></div>
<div class="row"><div class="lbl">Confidence</div><div class="val" id="c6"></div></div>
</div></div>
<script>
// ponytail: send base64 JSON instead of multipart — zero server deps
const dz=document.getElementById('dz'),fi=document.getElementById('fi'),pv=document.getElementById('prev'),btn=document.getElementById('go'),sp=document.getElementById('sp'),er=document.getElementById('er'),res=document.getElementById('res');
let b64=null;
dz.onclick=()=>fi.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add('active')};
dz.ondragleave=()=>dz.classList.remove('active');
dz.ondrop=e=>{e.preventDefault();dz.classList.remove('active');load(e.dataTransfer.files[0])};
fi.onchange=()=>load(fi.files[0]);
function load(f){if(!f||!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{b64=e.target.result;pv.src=b64;pv.style.display='block'};r.readAsDataURL(f);btn.disabled=false;er.style.display='none';res.style.display='none'}
btn.onclick=async()=>{if(!b64)return;btn.disabled=true;sp.style.display='block';er.style.display='none';res.style.display='none';try{const r=await fetch('/api/analyze',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({image:b64})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');['c1','c2','c3','c4','c5','c6'].forEach((id,i)=>document.getElementById(id).textContent=[d.card||'-',d.player||'-',d.year_set||'-',d.condition||'-',d.estimated_value||'-',d.confidence||'-'][i]);res.style.display='block'}catch(e){er.textContent=e.message;er.style.display='block'}finally{btn.disabled=false;sp.style.display='none'}};
</script>
</body></html>
